name: Daily Seed

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run-seeder:
    runs-on: ubuntu-latest
    steps:
      - name: Call daily-seed endpoint
        run: |
          curl -X POST \
            -H "X-Seed-Secret: ${{ secrets.SEED_SECRET }}" \
            --fail-with-body \
            "${{ secrets.API_BASE_URL }}/api/system/daily-seed"
